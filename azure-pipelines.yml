trigger:
- main  # or your default branch

pool:
  name: 'MySelfHostedPool'   # We will create this pool in the next steps
steps:
- task: Maven@4
  inputs:
    mavenPomFile: 'pom.xml'
    mavenOptions: '-Xmx3072m'
    javaHomeOption: 'JDKVersion'
    jdkVersionOption: '1.17'  # or 11/21 depending on your project
    jdkArchitectureOption: 'x64'
    goals: 'clean package'   # Change to clean install / test etc. as needed
    publishJUnitResults: true
    testResultsFiles: '**/surefire-reports/TEST-*.xml'
    


