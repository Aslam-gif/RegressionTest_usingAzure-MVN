trigger:
- main

pool:
  name: 'MySelfHostedPool'

steps:
- task: Maven@4
  inputs:
    mavenPomFile: 'pom.xml'
    goals: 'clean package'           # Change to 'clean install' if your project needs it
    javaHomeOption: 'Path'           # Use the system's Java
    jdkDirectory: '$(JAVA_HOME)'     # This points to your Java 21
    mavenOptions: '-Xmx3072m'
    publishJUnitResults: true
    testResultsFiles: '**/surefire-reports/TEST-*.xml'
  displayName: 'Maven Build with Java 21'